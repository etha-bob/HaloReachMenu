<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Halo Reach - Title Screen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="menu-viewport" class="rain-active">
        <!-- Layers rendered back-to-front (order matters for compositing) -->
        <div class="layer" id="layer-background">
            <img src="bitmaps/title_background.png" alt="">
        </div>
        <div class="layer" id="layer-back-01">
            <img src="bitmaps/title_back_01.png" alt="">
        </div>
        <!-- <div class="layer" id="layer-back-02">
            <img src="bitmaps/title_back_02.png" alt="">
        </div> -->
        <!-- Midground uses a scrolling div instead of a single img -->
        <div class="layer" id="layer-midground">
            <div class="scrolling-texture" id="midground-scroll"></div>
        </div>
        <div class="layer" id="layer-front">
            <img src="bitmaps/title_front.png" alt="">
        </div>
    </div>

    <!-- Click overlay to start audio (browser autoplay policy) -->
    <!-- <div id="start-overlay">
        <p>Click anywhere to start</p>
    </div> -->

    <script src="menu.js"></script>
</body>
</html>
